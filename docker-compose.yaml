services:

  # ── Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bebeque
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/seed-database.sql:/docker-entrypoint-initdb.d/seed.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,s3
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
    volumes:
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init.sh
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues --region us-east-1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Application services ─────────────────────────────────────

  analytics-api:
    build:
      context: ./services/analytics-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bebeque
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./services/analytics-api/app:/app/app

  biomass-ingestion:
    build:
      context: ./services/biomass-ingestion
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bebeque
      SQS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/biomass-queue
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./services/biomass-ingestion/app:/app/app

  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bebeque
      SQS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/data-ingestion-queue
      S3_BUCKET_NAME: bebeque-uploads
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./services/data-ingestion/app:/app/app

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      SQS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/notifications-queue
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      ENVIRONMENT: development
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./services/notification-service/app:/app/app

volumes:
  postgres_data:
  localstack_data: