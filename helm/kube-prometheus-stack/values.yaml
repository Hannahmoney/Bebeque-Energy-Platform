# helm/kube-prometheus-stack/values.yaml

nameOverride: ""
fullnameOverride: ""

# ─── PROMETHEUS ───────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "18GB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ─── GRAFANA ──────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "bebeque-grafana-2024"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: Bebeque
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# ─── ALERTMANAGER ─────────────────────────────────────────
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      smtp_smarthost: "email-smtp.us-east-1.amazonaws.com:587"
      smtp_from: "alerts@inspireherinitiative.xyz"
      smtp_require_tls: true

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: bebeque-email

    receivers:
      - name: bebeque-email
        email_configs:
          - to: "nnennaorjiugo@gmail.com"
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace"]

# ─── METRICS SERVER ───────────────────────────────────────
# installed as part of this chart via kube-prometheus-stack
# fixes HPA cpu unknown immediately

# ─── NODE EXPORTER ────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── KUBE STATE METRICS ───────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── KUBE CONTROLLER MANAGER / SCHEDULER ─────────────────
# EKS manages these — disable scraping to avoid false alerts
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false