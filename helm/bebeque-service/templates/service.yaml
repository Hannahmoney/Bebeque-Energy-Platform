{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bebeque-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bebeque-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "bebeque-service.selectorLabels" . | nindent 4 }}
{{- end }}






