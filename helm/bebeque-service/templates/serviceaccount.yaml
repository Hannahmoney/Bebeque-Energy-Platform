apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bebeque-service.labels" . | nindent 4 }}
  annotations:
    # IRSA: links this Kubernetes service account to the AWS IAM role.
    # EKS exchanges the pod's projected service account token for temporary
    # AWS credentials scoped to this role. No static access keys anywhere.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.iamRoleArn }}


