apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bebeque-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bebeque-service.labels" . | nindent 4 }}
spec:
  # When HPA or KEDA is enabled they own replica count at runtime.
  # We still set this to avoid Helm diff noise on every sync.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bebeque-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bebeque-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Forces a rolling restart when values change.
        # Without this a config-only change would not trigger a new rollout.
        checksum/values: {{ toYaml .Values | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # Soft preference to spread pods across nodes.
      # Does not block scheduling if nodes are scarce.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "bebeque-service.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: {{ include "bebeque-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.service.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      # Gives the container time to finish in-flight work before termination.
      # SQS workers use this to ack messages before the pod dies.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}







