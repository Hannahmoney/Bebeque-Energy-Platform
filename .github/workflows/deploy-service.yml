name: Deploy Service (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name matching ECR repo and Helm values file"
        required: true
        type: string
      helm-values-staging:
        description: "Path to staging Helm values file relative to repo root"
        required: true
        type: string
      helm-values-production:
        description: "Path to production Helm values file relative to repo root"
        required: true
        type: string
    secrets:
      AWS_ACCOUNT_ID:
        required: true

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: bebeque-eks-cluster
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/bebeque-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ inputs.service-name }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag from Git SHA
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/bebeque/${{ inputs.service-name }}:${{ steps.meta.outputs.tag }} \
            services/${{ inputs.service-name }}

      - name: Push to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/bebeque/${{ inputs.service-name }}:${{ steps.meta.outputs.tag }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/bebeque-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ inputs.service-name }}-staging

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm deploy to staging
        run: |
          helm upgrade --install ${{ inputs.service-name }} helm/bebeque-service \
            --namespace staging \
            --create-namespace \
            --values ${{ inputs.helm-values-staging }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/bebeque-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ inputs.service-name }}-production

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm deploy to production
        run: |
          helm upgrade --install ${{ inputs.service-name }} helm/bebeque-service \
            --namespace production \
            --create-namespace \
            --values ${{ inputs.helm-values-production }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}