name: Deploy data-ingestion

on:
  push:
    branches:
      - main
    paths:
      - 'services/data-ingestion/**'
      - 'helm/bebeque-service/**'
      - '.github/workflows/deploy-data-ingestion.yml'
      - '.github/workflows/deploy-service.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service-name: data-ingestion
      helm-values-staging: helm/bebeque-service/values/data-ingestion.staging.yaml
      helm-values-production: helm/bebeque-service/values/data-ingestion.production.yaml
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}